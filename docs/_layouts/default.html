<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-left">
                <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo Left" class="side-logo">
            </div>
            
            <div class="header-center">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 400 200" class="arched-text-svg">
                        <path id="curve" d="M 50 180 A 150 150 0 0 1 350 180" fill="transparent" />
                        <text>
                            <textPath href="#curve" startOffset="50%" text-anchor="middle">
                                Shree pathanjala maharishi yoga kendhram trust
                            </textPath>
                        </text>
                    </svg>
                    <img src="{{ '/assets/images/guruLogo.png' | relative_url }}" alt="Guru Logo" class="center-guru-logo">
                </div>
                <p class="address">
                    Alagar koil, Madurai, Tamilnadu
                </p>
            </div>
            
            <div class="header-right">
                <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo Right" class="side-logo">
            </div>
        </div>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/biography-1.html' | relative_url }}">Biography</a>
            <a href="{{ '/photos.html' | relative_url }}">Photos</a>
            <a href="{{ '/articles.html' | relative_url }}">Articles</a>
        </nav>
    </header>

    <div class="hero-image-container">
        <img src="{{ '/assets/images/pathajaliwithguru.png' | relative_url }}" alt="Pathanjali with Guru" class="hero-image">
    </div>

    <main class="content">
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. A Non-Profit Organization dedicated to Yoga.</p>
        <div class="visit-counter">
            Visits this year: <span id="visit-count">Loading...</span>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                document.getElementById('visit-count').innerText = "1,432";
            });
        </script>
    </footer>
</body>
</html>
