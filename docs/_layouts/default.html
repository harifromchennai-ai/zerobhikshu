<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-left">
                <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo Left" class="side-logo">
            </div>
            
            <div class="header-center">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 800 450" class="arched-text-svg">
                        <path id="curve" d="M 50 420 A 350 350 0 0 1 750 420" fill="transparent" />
                        <text>
                            <textPath href="#curve" startOffset="50%" text-anchor="middle">
                                Shree Pathanjali Maharishi Yoga Kendhram Trust
                            </textPath>
                        </text>
                    </svg>
                    <img src="{{ '/assets/images/guruLogo.png' | relative_url }}" alt="Guru Logo" class="center-guru-logo">
                </div>
                <p class="address">
                    Alagar koil, Madurai, Tamilnadu
                </p>
            </div>
            
            <div class="header-right">
                <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo Right" class="side-logo">
            </div>
        </div>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/biography-1.html' | relative_url }}">GuruBiography</a>
            <a href="{{ '/photos.html' | relative_url }}">Photos</a>
            <a href="{{ '/articles.html' | relative_url }}">Articles</a>
            <span class="lang-toggle">
                <a href="#" class="active" id="lang-ta" title="Tamil">TA</a> | <a href="#" id="lang-en" title="English">EN</a>
            </span>
        </nav>
    </header>

    <div class="hero-image-container">
        <img src="{{ '/assets/images/pathajaliwithguru.png' | relative_url }}" alt="Pathanjali with Guru" class="hero-image">
    </div>

    <main class="content">
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. A Non-Profit Organization dedicated to Yoga.</p>
        <div class="visit-counter">
            Visits this year: <span id="visit-count">Loading...</span>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                document.getElementById('visit-count').innerText = "1,432";

                // Language Toggle Logic
                const path = window.location.pathname;
                const langTa = document.getElementById('lang-ta');
                const langEn = document.getElementById('lang-en');
                
                const isEnglish = path.includes('/en-');
                
                if (isEnglish) {
                    langEn.classList.add('active');
                    langTa.classList.remove('active');
                    langTa.href = path.replace('/en-', '/');
                    langEn.href = "javascript:void(0)";
                } else {
                    langTa.classList.add('active');
                    langEn.classList.remove('active');
                    
                    let enPath = path;
                    if (path === '/' || path.endsWith('/')) {
                        enPath = path + 'en-index.html';
                    } else {
                        const parts = path.split('/');
                        const file = parts.pop();
                        if (file) {
                            parts.push('en-' + file);
                            enPath = parts.join('/');
                        }
                    }
                    langEn.href = enPath;
                    langTa.href = "javascript:void(0)";
                }
            });
        </script>
    </footer>
</body>
</html>
